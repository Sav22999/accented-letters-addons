<html>

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./css/accentedletters.css"/>
</head>

<body>
<div id="popup-content">
    <div id="popup-content-background"></div>
    <div id="titles">
        <input type="button" class="section_title" id="lowercase" value="Lowercase"/><input type="button"
                                                                                            class="section_title"
                                                                                            id="uppercase"
                                                                                            value="Uppercase"/>
        <button class="section_title" id="settings_btn">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <circle cx="12" cy="12" r="3"></circle>
                <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path>
            </svg>
        </button>
    </div>
    <div id="search-container" style="display: none; padding: 4px; background: #f5f5f5;">
        <input type="text" id="search-bar" placeholder="Search character..." style="width: 100%; padding: 5px; border: 1px solid #ccc; border-radius: 3px; font-family: 'opensans', sans-serif;">
    </div>
    <div id="letters_container"
         style="overflow-y: auto; height: calc(100% - 38px); position: absolute; top: 38px; width: 100%;">
        <div id="letters" style="position: relative; top: 0;">
            <!-- Lettere verranno caricate dinamicamente -->
            <div id="default_letters" class="chars_container"></div>
            <div id="extra_letters" class="chars_container"></div>
        </div>
    </div>
    <input type="text" id="text_to_copy" style="display: none;"/>
    <!--Model: <input type="button" class="letter" value="" />-->
</div>
<script src="./js/accentedletters.js"></script>
</body>

</html>
